<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d1a">
    <title>账户 — ReelSpeak</title>
    <style>
        /* ── Reset & Base ─────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg:        #0d0d1a;
            --bg-card:   rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --border:    rgba(255,255,255,0.08);
            --border-hi: rgba(255,255,255,0.14);
            --text-1:    #f5f5f7;
            --text-2:    #aeaeb2;
            --text-3:    #636366;
            --accent:    #e94560;
            --gift:      #ff9f0a;
            --sub:       #0a84ff;
            --paid:      #30d158;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text-1);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ───────────────────────────────────────────── */
        .page {
            min-height: 100vh;
            padding: calc(env(safe-area-inset-top) + 16px) 16px
                     calc(env(safe-area-inset-bottom) + 32px);
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── Top Nav ──────────────────────────────────────────── */
        .top-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-2);
            text-decoration: none;
            font-size: 18px;
            flex-shrink: 0;
            transition: background 0.15s, border-color 0.15s;
        }
        .back-btn:hover { background: var(--bg-card-hover); border-color: var(--border-hi); }
        .nav-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-1);
        }

        /* ── User Hero ────────────────────────────────────────── */
        .user-hero {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-hi);
            flex-shrink: 0;
        }
        .user-avatar-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #7b1fa2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .user-info { flex: 1; min-width: 0; }
        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-email {
            font-size: 13px;
            color: var(--text-2);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .plan-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .plan-free { background: rgba(255,255,255,0.1); color: var(--text-2); border: 1px solid var(--border-hi); }
        .plan-plus { background: rgba(10,132,255,0.2); color: #5ac8fa; border: 1px solid rgba(10,132,255,0.3); }
        .plan-pro  { background: rgba(233,69,96,0.2); color: #ff6b87; border: 1px solid rgba(233,69,96,0.3); }

        /* ── Section ──────────────────────────────────────────── */
        .section { margin-bottom: 24px; }
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        /* ── Credits Block ────────────────────────────────────── */
        .credits-total {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .credits-total-label { font-size: 14px; color: var(--text-2); }
        .credits-total-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-1);
            font-variant-numeric: tabular-nums;
        }
        .credits-total-unit { font-size: 15px; font-weight: 400; color: var(--text-3); margin-left: 4px; }

        .credits-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .credit-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        .credit-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.06;
            border-radius: inherit;
        }
        .credit-card.gift::before   { background: var(--gift); }
        .credit-card.sub::before    { background: var(--sub); }
        .credit-card.paid::before   { background: var(--paid); }

        .credit-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }
        .credit-card.gift .credit-icon { background: rgba(255,159,10,0.15); }
        .credit-card.sub  .credit-icon { background: rgba(10,132,255,0.15); }
        .credit-card.paid .credit-icon { background: rgba(48,209,88,0.15); }

        .credit-amount {
            font-size: 22px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .credit-card.gift .credit-amount { color: var(--gift); }
        .credit-card.sub  .credit-amount { color: var(--sub); }
        .credit-card.paid .credit-amount { color: var(--paid); }

        .credit-label { font-size: 11px; color: var(--text-3); font-weight: 500; }
        .credit-expiry {
            font-size: 10px;
            color: var(--text-3);
            margin-top: -4px;
        }
        .credit-expiry.soon { color: #ff6b6b; }

        /* ── Rate Limits ──────────────────────────────────────── */
        .rate-list { display: flex; flex-direction: column; gap: 10px; }
        .rate-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
        }
        .rate-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .rate-cap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-1);
        }
        .rate-cap-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: rgba(233,69,96,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .rate-count {
            font-size: 13px;
            color: var(--text-2);
            font-variant-numeric: tabular-nums;
        }
        .rate-bar-bg {
            height: 5px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }
        .rate-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), #ff6b87);
            transition: width 0.6s cubic-bezier(.4,0,.2,1);
        }
        .rate-bar-fill.full { background: #ff4444; }
        .rate-bar-fill.empty { background: rgba(255,255,255,0.15); }

        /* ── Usage History ────────────────────────────────────── */
        .history-list { display: flex; flex-direction: column; gap: 2px; }
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            transition: background 0.15s;
        }
        .history-item:hover { background: var(--bg-card-hover); border-color: var(--border); }
        .history-cap-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(233,69,96,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .history-main { flex: 1; min-width: 0; }
        .history-cap-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-1);
        }
        .history-time {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 2px;
        }
        .history-right { text-align: right; flex-shrink: 0; }
        .history-credits {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
            font-variant-numeric: tabular-nums;
        }
        .history-credits.nonzero { color: var(--accent); }
        .history-status {
            font-size: 10px;
            margin-top: 2px;
            color: var(--text-3);
        }
        .history-status.success { color: #30d158; }
        .history-status.failed  { color: #ff4444; }

        .empty-history {
            text-align: center;
            padding: 32px 0;
            color: var(--text-3);
            font-size: 14px;
        }

        /* ── Settings ────────────────────────────────────────── */
        .settings-list { display: flex; flex-direction: column; gap: 2px; }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
        }
        .setting-row:first-child { border-radius: var(--radius-md) var(--radius-md) var(--radius-sm) var(--radius-sm); }
        .setting-row:last-child  { border-radius: var(--radius-sm) var(--radius-sm) var(--radius-md) var(--radius-md); }
        .setting-row:only-child  { border-radius: var(--radius-md); }
        .setting-label {
            font-size: 14px;
            color: var(--text-1);
            white-space: nowrap;
        }
        .setting-label small {
            display: block;
            font-size: 11px;
            color: var(--text-3);
            margin-top: 2px;
            font-weight: 400;
        }
        .setting-control {
            flex-shrink: 0;
        }
        .setting-select {
            background: rgba(255,255,255,0.08);
            color: var(--text-1);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            max-width: 160px;
        }
        .setting-select:focus { border-color: var(--accent); }
        .setting-input {
            background: rgba(255,255,255,0.06);
            color: var(--text-1);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            font-size: 12px;
            font-family: "SF Mono", "Menlo", monospace;
            outline: none;
            width: 200px;
        }
        .setting-input:focus { border-color: var(--accent); }
        .setting-saved {
            font-size: 11px;
            color: var(--paid);
            margin-left: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .setting-saved.show { opacity: 1; }

        /* ── Logout ───────────────────────────────────────────── */
        .logout-btn {
            width: 100%;
            padding: 14px;
            background: rgba(233,69,96,0.08);
            border: 1px solid rgba(233,69,96,0.2);
            border-radius: var(--radius-md);
            color: var(--accent);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            margin-top: 8px;
        }
        .logout-btn:hover { background: rgba(233,69,96,0.15); border-color: rgba(233,69,96,0.35); }

        /* ── Skeleton loader ──────────────────────────────────── */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255,255,255,0.05) 25%,
                rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
        .sk-line { height: 14px; margin-bottom: 8px; }
        .sk-line.w60 { width: 60%; }
        .sk-line.w40 { width: 40%; }
        .sk-block { height: 80px; }

        /* ── Mobile safe area ─────────────────────────────────── */
        @media (max-width: 400px) {
            .credits-grid { grid-template-columns: repeat(3, 1fr); }
            .credit-amount { font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Top Nav -->
    <nav class="top-nav">
        <a href="/app" class="back-btn" aria-label="返回">
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
                <path d="M8.5 1.5L1.5 8L8.5 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
        <span class="nav-title">账户</span>
    </nav>

    <!-- User Hero -->
    <div class="user-hero" id="userHero">
        <div class="skeleton" style="width:60px;height:60px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;">
            <div class="skeleton sk-line w60"></div>
            <div class="skeleton sk-line w40"></div>
        </div>
    </div>

    <!-- Block 1: Credits -->
    <div class="section">
        <div class="section-title">Credits 余额</div>
        <div class="credits-total" id="creditsTotal">
            <div>
                <div class="credits-total-label">可用总额</div>
            </div>
            <div>
                <span class="credits-total-value skeleton" style="display:inline-block;width:80px;height:36px;border-radius:8px;"></span>
            </div>
        </div>
        <div class="credits-grid" id="creditsGrid">
            <div class="credit-card"><div class="skeleton sk-block"></div></div>
            <div class="credit-card"><div class="skeleton sk-block"></div></div>
            <div class="credit-card"><div class="skeleton sk-block"></div></div>
        </div>
    </div>

    <!-- Block 2: Today's Usage -->
    <div class="section">
        <div class="section-title">今日使用</div>
        <div class="rate-list" id="rateList">
            <div class="rate-item"><div class="skeleton sk-line"></div><div class="skeleton sk-line w60"></div></div>
            <div class="rate-item"><div class="skeleton sk-line"></div><div class="skeleton sk-line w60"></div></div>
            <div class="rate-item"><div class="skeleton sk-line"></div><div class="skeleton sk-line w60"></div></div>
        </div>
    </div>

    <!-- Block 3: Usage History -->
    <div class="section">
        <div class="section-title">使用记录</div>
        <div class="history-list" id="historyList">
            <div class="skeleton sk-block" style="height:56px;border-radius:12px;margin-bottom:2px;"></div>
            <div class="skeleton sk-block" style="height:56px;border-radius:12px;margin-bottom:2px;"></div>
            <div class="skeleton sk-block" style="height:56px;border-radius:12px;"></div>
        </div>
    </div>

    <!-- Block 4: 偏好设置 -->
    <div class="section">
        <div class="section-title">偏好设置</div>
        <div class="settings-list">

            <!-- 界面语言 -->
            <div class="setting-row">
                <div class="setting-label">界面语言</div>
                <div class="setting-control">
                    <select class="setting-select" id="settingUiLang">
                        <option value="zh-CN">简体中文</option>
                        <option value="zh-TW">繁體中文</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="th">ภาษาไทย</option>
                    </select>
                </div>
            </div>

            <!-- 字幕翻译语言 -->
            <div class="setting-row">
                <div class="setting-label">
                    字幕翻译语言
                    <small>视频识别后自动翻译的目标语言</small>
                </div>
                <div class="setting-control">
                    <select class="setting-select" id="settingTranslateLang">
                        <option value="">跟随界面语言</option>
                        <option value="中文">中文（简体）</option>
                        <option value="繁體中文">中文（繁體）</option>
                        <option value="English">English</option>
                        <option value="日本語">日本語</option>
                        <option value="한국어">한국어</option>
                        <option value="ไทย">ภาษาไทย</option>
                        <option value="Français">Français</option>
                        <option value="Deutsch">Deutsch</option>
                        <option value="Español">Español</option>
                        <option value="Português">Português</option>
                        <option value="Русский">Русский</option>
                        <option value="Italiano">Italiano</option>
                        <option value="Tiếng Việt">Tiếng Việt</option>
                        <option value="Bahasa Indonesia">Bahasa Indonesia</option>
                    </select>
                </div>
            </div>

            <!-- 默认保存路径 -->
            <div class="setting-row" style="flex-wrap:wrap;gap:8px;">
                <div class="setting-label">
                    默认保存路径
                    <small>导出字幕/视频时的本地目录</small>
                </div>
                <div class="setting-control" style="display:flex;align-items:center;gap:6px;">
                    <input type="text" class="setting-input" id="settingExportDir"
                           placeholder="/Users/你的名字/Desktop">
                    <span class="setting-saved" id="exportDirSaved">已保存</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Logout -->
    <div class="section">
        <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>

</div>
<script src="i18n.js?v=20260712a"></script>
<script src="profile.js?v=20260716a"></script>
</body>
</html>
