<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d0d1a">
    <title>使用记录 — ReelSpeak</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg:        #0d0d1a;
            --bg-card:   rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.07);
            --border:    rgba(255,255,255,0.08);
            --border-hi: rgba(255,255,255,0.14);
            --text-1:    #f5f5f7;
            --text-2:    #aeaeb2;
            --text-3:    #636366;
            --accent:    #e94560;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            background: var(--bg);
            color: var(--text-1);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;
            padding: calc(env(safe-area-inset-top) + 16px) 16px
                     calc(env(safe-area-inset-bottom) + 32px);
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── Top Nav ── */
        .top-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-2);
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
            transition: background 0.15s, border-color 0.15s;
        }
        .back-btn:hover { background: var(--bg-card-hover); border-color: var(--border-hi); }
        .nav-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-1);
        }

        /* ── Summary bar ── */
        .summary-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .summary-card {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            text-align: center;
        }
        .summary-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-1);
            font-variant-numeric: tabular-nums;
        }
        .summary-label {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 3px;
        }

        /* ── History list ── */
        .history-list { display: flex; flex-direction: column; gap: 2px; }
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            transition: background 0.15s;
        }
        .history-item:hover { background: var(--bg-card-hover); border-color: var(--border); }
        .history-cap-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: rgba(233,69,96,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .history-main { flex: 1; min-width: 0; }
        .history-cap-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-1);
        }
        .history-time {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 2px;
        }
        .history-right { text-align: right; flex-shrink: 0; }
        .history-credits {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
            font-variant-numeric: tabular-nums;
        }
        .history-credits.nonzero { color: var(--accent); }
        .history-status {
            font-size: 10px;
            margin-top: 2px;
            color: var(--text-3);
        }
        .history-status.success { color: #30d158; }
        .history-status.failed  { color: #ff4444; }

        .empty-state {
            text-align: center;
            padding: 64px 0;
            color: var(--text-3);
            font-size: 15px;
        }
        .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

        /* ── Load more ── */
        .load-more-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-3);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .load-more-btn:hover { color: var(--text-2); border-color: var(--border-hi); }
        .load-more-btn:disabled { opacity: 0.4; cursor: default; }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg,
                rgba(255,255,255,0.05) 25%,
                rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body>
<div class="page">

    <!-- Top Nav -->
    <nav class="top-nav">
        <button class="back-btn" id="backBtn">
            <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
                <path d="M8.5 1.5L1.5 8L8.5 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <span class="nav-title" data-i18n="profile.history">Usage History</span>
    </nav>

    <!-- Summary bar (skeleton until data loads) -->
    <div class="summary-bar" id="summaryBar">
        <div class="summary-card">
            <div class="skeleton" style="height:26px;width:60px;margin:0 auto 6px;"></div>
            <div class="skeleton" style="height:12px;width:80px;margin:0 auto;"></div>
        </div>
        <div class="summary-card">
            <div class="skeleton" style="height:26px;width:60px;margin:0 auto 6px;"></div>
            <div class="skeleton" style="height:12px;width:80px;margin:0 auto;"></div>
        </div>
        <div class="summary-card">
            <div class="skeleton" style="height:26px;width:60px;margin:0 auto 6px;"></div>
            <div class="skeleton" style="height:12px;width:80px;margin:0 auto;"></div>
        </div>
    </div>

    <!-- History list -->
    <div class="history-list" id="historyList">
        <div class="history-item"><div class="skeleton" style="width:34px;height:34px;border-radius:10px;flex-shrink:0;"></div><div style="flex:1;"><div class="skeleton" style="height:13px;width:60%;margin-bottom:6px;"></div><div class="skeleton" style="height:11px;width:40%;"></div></div></div>
        <div class="history-item"><div class="skeleton" style="width:34px;height:34px;border-radius:10px;flex-shrink:0;"></div><div style="flex:1;"><div class="skeleton" style="height:13px;width:55%;margin-bottom:6px;"></div><div class="skeleton" style="height:11px;width:35%;"></div></div></div>
        <div class="history-item"><div class="skeleton" style="width:34px;height:34px;border-radius:10px;flex-shrink:0;"></div><div style="flex:1;"><div class="skeleton" style="height:13px;width:50%;margin-bottom:6px;"></div><div class="skeleton" style="height:11px;width:40%;"></div></div></div>
    </div>

</div>

<script src="i18n.js?v=20260717c"></script>
<script>
// ── Constants ────────────────────────────────────────────────────
const CAP_LABEL_KEY = {
    transcription:  "cap.transcription",
    tts_synthesis:  "cap.tts_synthesis",
    pronunciation:  "cap.pronunciation",
    translation:    "cap.translation",
    export:         "cap.export",
    romanize:       "cap.romanize",
    word_definition:"cap.word_definition",
    ocr:            "cap.ocr",
};

const CAP_ICON = {
    transcription:  "🎙",
    tts_synthesis:  "🔊",
    pronunciation:  "📊",
    translation:    "🌐",
    export:         "📤",
    romanize:       "🔤",
    word_definition:"📖",
    ocr:            "🔍",
};

// ── Time helpers ─────────────────────────────────────────────────
function relativeTime(dateStr) {
    if (!dateStr) return "";
    const diff = Date.now() - new Date(dateStr + (dateStr.includes("T") ? "" : "Z")).getTime();
    const min  = Math.floor(diff / 60000);
    const hr   = Math.floor(diff / 3600000);
    const day  = Math.floor(diff / 86400000);
    if (min < 1)  return I18N.t("time.justNow");
    if (min < 60) return I18N.t("time.minutesAgo", { n: min });
    if (hr  < 24) return I18N.t("time.hoursAgo",   { n: hr  });
    if (day < 7)  return I18N.t("time.daysAgo",    { n: day });
    const locale = { "zh-CN": "zh-CN", "zh-TW": "zh-TW", "ja": "ja-JP", "ko": "ko-KR", "th": "th-TH", "en": "en-US" }[I18N.currentLang] || "en-US";
    return new Date(dateStr + (dateStr.includes("T") ? "" : "Z")).toLocaleDateString(locale);
}

// ── Render one item ───────────────────────────────────────────────
function renderItem(item) {
    const cap     = item.capability || "";
    const label   = I18N.t(CAP_LABEL_KEY[cap] || cap);
    const icon    = CAP_ICON[cap] || "•";
    const credits = item.credits_charged || 0;
    const status  = item.status || "success";
    const time    = relativeTime(item.requested_at);
    const statusLabel = {
        success:  I18N.t("profile.statusSuccess"),
        failed:   I18N.t("profile.statusFailed"),
        refunded: I18N.t("profile.statusRefunded"),
        timeout:  I18N.t("profile.statusTimeout"),
    }[status] || status;

    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
        <div class="history-cap-icon">${icon}</div>
        <div class="history-main">
            <div class="history-cap-name">${label}</div>
            <div class="history-time">${time}</div>
        </div>
        <div class="history-right">
            <div class="history-credits ${credits > 0 ? "nonzero" : ""}">
                ${credits > 0 ? "−" + credits : "0"} C
            </div>
            <div class="history-status ${status}">${statusLabel}</div>
        </div>
    `;
    return div;
}

// ── Load data ─────────────────────────────────────────────────────
const PAGE_SIZE = 50;
let _offset = 0;
let _total  = 0;
let _allItems = [];

async function loadUsage(append = false) {
    const res  = await fetch(`/api/user/usage?limit=${PAGE_SIZE}&offset=${_offset}`);
    const data = await res.json();

    const history = data.history || [];
    _total        = data.total   || history.length;
    _offset      += history.length;

    if (!append) {
        _allItems = history;
        renderSummary(_allItems);
        renderList(_allItems);
    } else {
        _allItems = _allItems.concat(history);
        appendItems(history);
    }

    updateLoadMore();
}

function renderSummary(items) {
    const totalCount   = _total;
    const totalCredits = items.reduce((s, i) => s + (i.credits_charged || 0), 0);
    const successCount = items.filter(i => i.status === "success").length;

    document.getElementById("summaryBar").innerHTML = `
        <div class="summary-card">
            <div class="summary-value">${totalCount}</div>
            <div class="summary-label" data-i18n="usage.totalCount">总次数</div>
        </div>
        <div class="summary-card">
            <div class="summary-value">${totalCredits.toLocaleString()}</div>
            <div class="summary-label" data-i18n="usage.totalCredits">消耗积分</div>
        </div>
        <div class="summary-card">
            <div class="summary-value">${successCount}</div>
            <div class="summary-label" data-i18n="usage.successCount">成功</div>
        </div>
    `;
    // apply i18n to newly injected data-i18n elements
    document.querySelectorAll("#summaryBar [data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        const t = I18N.t(key);
        if (t !== key) el.textContent = t;
    });
}

function renderList(items) {
    const container = document.getElementById("historyList");
    container.innerHTML = "";

    if (!items || items.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div>${I18N.t("profile.noHistory")}</div>
            </div>`;
        return;
    }

    items.forEach(item => container.appendChild(renderItem(item)));
}

function appendItems(items) {
    const container = document.getElementById("historyList");
    // Remove existing load-more button before appending
    const existing = document.getElementById("loadMoreBtn");
    if (existing) existing.remove();
    items.forEach(item => container.appendChild(renderItem(item)));
}

function updateLoadMore() {
    const container = document.getElementById("historyList");
    let btn = document.getElementById("loadMoreBtn");
    if (_offset < _total) {
        if (!btn) {
            btn = document.createElement("button");
            btn.id = "loadMoreBtn";
            btn.className = "load-more-btn";
            btn.addEventListener("click", async () => {
                btn.disabled = true;
                btn.textContent = "…";
                await loadUsage(true);
            });
            container.appendChild(btn);
        }
        btn.disabled = false;
        btn.textContent = `加载更多（还有 ${_total - _offset} 条）`;
    } else if (btn) {
        btn.remove();
    }
}

// ── Back button ───────────────────────────────────────────────────
document.getElementById("backBtn").addEventListener("click", () => {
    if (history.length > 1 && document.referrer.includes(location.host)) {
        history.back();
    } else {
        location.href = "/profile";
    }
});

// ── Init ─────────────────────────────────────────────────────────
I18N.init();
document.title = I18N.t("profile.history") + " — ReelSpeak";

(async () => {
    // Check login
    const me = await fetch("/api/auth/me").then(r => r.json());
    if (!me.logged_in) { location.href = "/app"; return; }

    await loadUsage();
})().catch(err => console.error("usage page error:", err));
</script>
</body>
</html>
